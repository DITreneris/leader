name: Bug report
description: Report a reproducible problem on the Leader landing page.
title: "[Bug]: "
labels:
  - bug
body:
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What happened and what you expected to happen.
    validations:
      required: true
  - type: input
    id: url
    attributes:
      label: URL
      description: Page URL where the issue occurs (include locale path).
      placeholder: "https://ditreneris.github.io/leader/en/"
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      description: Minimal steps to reproduce the issue.
      placeholder: |
        1. Go to ...
        2. Click ...
        3. See ...
    validations:
      required: true
  - type: dropdown
    id: locale
    attributes:
      label: Locale
      options:
        - en
        - lt
        - both
    validations:
      required: true
  - type: textarea
    id: screenshots
    attributes:
      label: Screenshots / recordings
      description: Drag and drop images or paste links.
    validations:
      required: false
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Browser, OS, device, and any relevant details.
      placeholder: "Chrome 125, Windows 11, desktop"
    validations:
      required: false
